<nav class="bg-white/95 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-gray-100">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16 items-center">

      <!-- Logo -->
      <a routerLink="/home" class="flex items-center gap-3 group">
        <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
          <span class="text-white font-bold text-lg">R</span>
        </div>
        <span class="font-serif text-xl font-bold text-primary group-hover:text-primary-light transition-colors">
          Rawebet
        </span>
      </a>

      <!-- Desktop Nav -->
      <div class="hidden lg:flex items-center gap-1">

        <a routerLink="/home"
           routerLinkActive="text-primary bg-primary/5"
           class="px-4 py-2 rounded-lg text-gray-700 hover:text-primary hover:bg-primary/5 font-medium text-sm transition-all">
          Home
        </a>

        <!-- Management Dropdown -->
        <div class="relative" *ngIf="isAdmin()">

          <button (click)="toggleManagement()"
                  class="px-4 py-2 rounded-lg text-gray-700 hover:text-primary hover:bg-primary/5 font-medium text-sm transition-all flex items-center gap-1">

            Management

            <svg class="w-4 h-4 transition-transform"
                 [class.rotate-180]="managementDropdown"
                 fill="none"
                 stroke="currentColor"
                 viewBox="0 0 24 24">

              <path stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M19 9l-7 7-7-7"/>

            </svg>

          </button>

          <div *ngIf="managementDropdown"
               class="absolute left-0 mt-2 w-64 bg-white rounded-xl shadow-xl border border-gray-100 py-2 animate-fade-in">

            <div class="px-3 py-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">
              Community
            </div>

            <a routerLink="/club"
               (click)="closeDropdowns()"
               class="flex items-center gap-3 px-4 py-2.5 hover:bg-primary/5 text-gray-700 hover:text-primary transition-colors">

              <span class="text-lg">🏛️</span>
              <span>Club</span>

            </a>

            <a routerLink="/subscriptions"
               (click)="closeDropdowns()"
               class="flex items-center gap-3 px-4 py-2.5 hover:bg-primary/5 text-gray-700 hover:text-primary transition-colors">

              <span class="text-lg">💳</span>
              <span>Subscriptions</span>

            </a>

          </div>

        </div>

        <!-- Direct club access -->
        <a routerLink="/club"
           routerLinkActive="text-primary bg-primary/5"
           class="px-4 py-2 rounded-lg text-gray-700 hover:text-primary hover:bg-primary/5 font-medium text-sm transition-all">

          Club

        </a>

        <a routerLink="/feedback"
           routerLinkActive="text-primary bg-primary/5"
           class="px-4 py-2 rounded-lg text-gray-700 hover:text-primary hover:bg-primary/5 font-medium text-sm transition-all">

          Feedback

        </a>

        <a routerLink="/notifications"
           routerLinkActive="text-primary bg-primary/5"
           class="px-4 py-2 rounded-lg text-gray-700 hover:text-primary hover:bg-primary/5 font-medium text-sm transition-all relative">

          🔔

          <span class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-accent text-white text-[10px] font-bold rounded-full flex items-center justify-center">
            3
          </span>

        </a>

      </div>

      <!-- Right actions -->
      <div class="hidden lg:flex items-center gap-3">

        <div class="relative" *ngIf="isAuthenticated()">

          <button (click)="toggleProfile()"
                  class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-50 transition-colors">

            <div class="w-8 h-8 bg-primary/10 rounded-full flex items-center justify-center">
              <span class="text-primary font-semibold text-sm">
                {{ userName.charAt(0) || 'U' }}
              </span>
            </div>

            <span class="text-sm font-medium text-dark">
              {{ userName || 'Account' }}
            </span>

          </button>

          <div *ngIf="profileDropdown"
               class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl border border-gray-100 py-2 animate-fade-in">

            <a routerLink="/profile"
               (click)="closeDropdowns()"
               class="block px-4 py-2.5 hover:bg-primary/5 text-gray-700 hover:text-primary">

              Profile

            </a>

            <button (click)="logout()"
                    class="w-full text-left px-4 py-2.5 hover:bg-red-50 text-red-600">

              Sign Out

            </button>

          </div>

        </div>

        <a *ngIf="!isAuthenticated()"
           routerLink="/auth/sign-in"
           class="px-4 py-2 rounded-lg bg-primary text-white font-medium text-sm hover:bg-primary-light">

          Sign In

        </a>

      </div>

      <!-- Mobile button -->
      <button (click)="toggleMobileMenu()"
              class="lg:hidden p-2 rounded-lg text-gray-600 hover:bg-gray-100">

        ☰

      </button>

    </div>
  </div>

  <!-- Mobile -->
  <div *ngIf="mobileMenuOpen"
       class="lg:hidden bg-white border-t border-gray-100">

    <div class="px-4 py-3 space-y-1">

      <a routerLink="/home"
         (click)="toggleMobileMenu()"
         class="block px-4 py-2.5">

        Home

      </a>

      <a routerLink="/club"
         (click)="toggleMobileMenu()"
         class="block px-4 py-2.5">

        🏛️ Club

      </a>

    </div>

  </div>

</nav>
