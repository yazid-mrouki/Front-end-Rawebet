<div class="min-h-screen bg-surface">
  <div class="bg-gradient-to-r from-indigo-600 to-primary py-16">
    <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
      <div>
        <h1 class="font-serif text-4xl font-bold text-white mb-2">🔔 Notifications</h1>
        <p class="text-white/80">Stay up to date with your events, tickets, and community.</p>
      </div>
      <button *ngIf="unreadCount > 0" (click)="markAllRead()" class="px-4 py-2 bg-white/20 backdrop-blur-sm text-white rounded-xl text-sm font-medium hover:bg-white/30 transition-colors">
        Mark all as read
      </button>
    </div>
  </div>

  <div class="max-w-3xl mx-auto px-6 py-10 space-y-3">
    <div *ngFor="let notif of notifications" (click)="markAsRead(notif.id)"
      class="bg-white rounded-2xl border p-5 hover:shadow-lg transition-all cursor-pointer"
      [class.border-primary/30]="!notif.read" [class.border-gray-100]="notif.read">
      <div class="flex items-start gap-4">
        <div class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl shrink-0"
          [class.bg-primary/10]="!notif.read" [class.bg-gray-50]="notif.read">
          {{ notif.emoji }}
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <h4 class="font-semibold text-dark text-sm">{{ notif.title }}</h4>
            <span *ngIf="!notif.read" class="w-2 h-2 bg-primary rounded-full shrink-0"></span>
          </div>
          <p class="text-gray-500 text-sm mt-0.5">{{ notif.message }}</p>
          <div class="text-gray-400 text-xs mt-2">{{ notif.time }}</div>
        </div>
      </div>
    </div>
  </div>
</div>
