<div class="min-h-screen bg-surface">
  <div class="bg-gradient-to-r from-purple-700 to-primary py-16">
    <div class="max-w-7xl mx-auto px-6">
      <h1 class="font-serif text-4xl font-bold text-white mb-2">👥 Clubs & Communities</h1>
      <p class="text-white/80">Join a club, develop your skills, and become an active participant in the cultural community.</p>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-10">
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div *ngFor="let club of clubs" class="bg-white rounded-2xl p-6 border border-gray-100 hover:shadow-xl transition-all duration-300 group">
        <div class="flex items-center gap-4 mb-4">
          <div class="w-14 h-14 bg-primary/10 rounded-2xl flex items-center justify-center text-3xl group-hover:scale-110 transition-transform">{{ club.emoji }}</div>
          <div>
            <h3 class="font-semibold text-dark text-lg">{{ club.name }}</h3>
            <p class="text-gray-400 text-sm">{{ club.members }} members</p>
          </div>
        </div>
        <p class="text-gray-600 text-sm leading-relaxed mb-4">{{ club.desc }}</p>
        <div class="flex flex-wrap gap-1.5 mb-4">
          <span *ngFor="let tag of club.tags" class="px-2.5 py-1 bg-primary/5 text-primary text-xs rounded-full font-medium">{{ tag }}</span>
        </div>
        <div class="text-xs text-gray-400 mb-4">📅 {{ club.nextSession }}</div>
        <div class="flex gap-2">
          <button class="flex-1 py-2.5 bg-primary text-white rounded-xl text-sm font-semibold hover:bg-primary-light transition-colors">Join Club</button>
          <button class="px-4 py-2.5 bg-gray-50 text-gray-600 rounded-xl text-sm font-medium hover:bg-gray-100 transition-colors">Details</button>
        </div>
      </div>
    </div>
  </div>
</div>
