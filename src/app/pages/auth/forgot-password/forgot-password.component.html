<div class="min-h-screen flex items-center justify-center bg-surface p-6">
  <div class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-gray-100 p-8">
    <h1 class="text-3xl font-bold text-dark mb-3">Forgot Password</h1>
    <p class="text-sm text-gray-500 mb-6">Enter your email address to receive a password reset link.</p>

    <form (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
        <input type="email" [(ngModel)]="email" name="email" required class="w-full px-4 py-3 rounded-2xl border border-gray-200 bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-sm" />
      </div>
      <button type="submit" class="w-full py-3 bg-primary text-white rounded-2xl font-semibold hover:bg-primary-light transition-colors">Send reset link</button>
    </form>

    <p *ngIf="message" class="mt-4 text-green-600 text-sm">{{ message }}</p>
    <p *ngIf="error" class="mt-4 text-red-600 text-sm">{{ error }}</p>

    <div class="mt-6 text-sm text-gray-500">
      <a routerLink="/auth/sign-in" class="text-primary hover:text-primary-light">Back to sign in</a>
    </div>
  </div>
</div>
