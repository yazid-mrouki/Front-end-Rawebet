<div class="min-h-screen flex">
  <!-- Left panel – Branding -->
  <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-accent via-primary-light to-primary relative overflow-hidden items-center justify-center">
    <div class="absolute inset-0 opacity-10">
      <div class="absolute top-20 right-20 w-72 h-72 bg-white rounded-full blur-3xl"></div>
      <div class="absolute bottom-32 left-16 w-96 h-96 bg-primary rounded-full blur-3xl"></div>
    </div>
    <div class="relative z-10 text-white text-center px-12 max-w-lg">
      <div class="w-20 h-20 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-8">
        <span class="text-4xl font-bold">R</span>
      </div>
      <h1 class="font-serif text-4xl font-bold mb-4">Join Rawebet Today</h1>
      <p class="text-white/80 text-lg leading-relaxed">Become part of a vibrant cultural community. Access events, films, clubs, and exclusive membership benefits.</p>
      <div class="mt-10 grid grid-cols-2 gap-4 text-left">
        <div class="bg-white/10 rounded-xl p-4">
          <div class="text-2xl mb-1">🎬</div>
          <div class="font-semibold text-sm">Films & Premieres</div>
        </div>
        <div class="bg-white/10 rounded-xl p-4">
          <div class="text-2xl mb-1">🎭</div>
          <div class="font-semibold text-sm">Live Events</div>
        </div>
        <div class="bg-white/10 rounded-xl p-4">
          <div class="text-2xl mb-1">👥</div>
          <div class="font-semibold text-sm">Join Clubs</div>
        </div>
        <div class="bg-white/10 rounded-xl p-4">
          <div class="text-2xl mb-1">⭐</div>
          <div class="font-semibold text-sm">Earn Rewards</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right panel – Form -->
  <div class="flex-1 flex items-center justify-center p-8 bg-surface">
    <div class="w-full max-w-md">
      <div class="lg:hidden flex items-center gap-3 mb-8">
        <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
          <span class="text-white font-bold text-lg">R</span>
        </div>
        <span class="font-serif text-xl font-bold text-primary">Rawebet</span>
      </div>

      <h2 class="font-serif text-3xl font-bold text-dark mb-2">Create Account</h2>
      <p class="text-gray-500 mb-8">Start your cultural journey with Rawebet</p>

      <form (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Full Name</label>
          <input type="text" name="fullName" [(ngModel)]="model.fullName" required
            placeholder="John Doe"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-sm" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
          <input type="email" name="email" [(ngModel)]="model.email" required
            placeholder="you@example.com"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-sm" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
          <input [type]="showPassword ? 'text' : 'password'" name="password" [(ngModel)]="model.password" required
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-sm" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Confirm Password</label>
          <input type="password" name="confirmPassword" [(ngModel)]="model.confirmPassword" required
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-sm" />
        </div>

        <label class="flex items-start gap-2 text-gray-600 text-sm">
          <input type="checkbox" class="rounded border-gray-300 text-primary focus:ring-primary/20 mt-0.5" />
          <span>I agree to the <a href="#" class="text-primary font-medium">Terms of Service</a> and <a href="#" class="text-primary font-medium">Privacy Policy</a></span>
        </label>

        <button type="submit" class="w-full py-3 bg-accent text-white rounded-xl font-semibold hover:bg-accent-light hover:text-dark transition-colors shadow-lg shadow-accent/20">
          Create Account
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-gray-500 text-sm">Already have an account? <a routerLink="/auth/sign-in" class="text-primary font-semibold hover:text-primary-light">Sign in</a></p>
      </div>
    </div>
  </div>
</div>
