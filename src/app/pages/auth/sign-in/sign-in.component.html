<div class="min-h-screen flex">
  <!-- Left panel – Branding -->
  <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-primary via-primary-light to-accent relative overflow-hidden items-center justify-center">
    <div class="absolute inset-0 opacity-10">
      <div class="absolute top-20 left-20 w-72 h-72 bg-white rounded-full blur-3xl"></div>
      <div class="absolute bottom-20 right-20 w-96 h-96 bg-accent rounded-full blur-3xl"></div>
    </div>
    <div class="relative z-10 text-white text-center px-12 max-w-lg">
      <div class="w-20 h-20 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-8">
        <span class="text-4xl font-bold">R</span>
      </div>
      <h1 class="font-serif text-4xl font-bold mb-4">Welcome back to Rawebet</h1>
      <p class="text-white/80 text-lg leading-relaxed">Your unified cultural center platform. Book events, watch films, join clubs — all in one place.</p>
      <div class="mt-10 flex justify-center gap-6 text-white/60 text-sm">
        <div class="text-center">
          <div class="text-2xl font-bold text-white">500+</div>
          <div>Events</div>
        </div>
        <div class="text-center">
          <div class="text-2xl font-bold text-white">10K+</div>
          <div>Members</div>
        </div>
        <div class="text-center">
          <div class="text-2xl font-bold text-white">50+</div>
          <div>Clubs</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right panel – Form -->
  <div class="flex-1 flex items-center justify-center p-8 bg-surface">
    <div class="w-full max-w-md">
      <!-- Mobile Logo -->
      <div class="lg:hidden flex items-center gap-3 mb-8">
        <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
          <span class="text-white font-bold text-lg">R</span>
        </div>
        <span class="font-serif text-xl font-bold text-primary">Rawebet</span>
      </div>

      <h2 class="font-serif text-3xl font-bold text-dark mb-2">Sign In</h2>
      <p class="text-gray-500 mb-8">Enter your credentials to access your account</p>

      <form (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
          <input type="email" name="email" [(ngModel)]="model.email" required
            placeholder="you@example.com"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-sm" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
          <div class="relative">
            <input [type]="showPassword ? 'text' : 'password'" name="password" [(ngModel)]="model.password" required
              placeholder="••••••••"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-sm pr-12" />
            <button type="button" (click)="showPassword = !showPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              {{ showPassword ? '🙈' : '👁️' }}
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center gap-2 text-gray-600">
            <input type="checkbox" class="rounded border-gray-300 text-primary focus:ring-primary/20" />
            Remember me
          </label>
          <a href="#" class="text-primary hover:text-primary-light font-medium">Forgot password?</a>
        </div>

        <button type="submit" class="w-full py-3 bg-primary text-white rounded-xl font-semibold hover:bg-primary-light transition-colors shadow-lg shadow-primary/20">
          Sign In
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-gray-500 text-sm">Don't have an account? <a routerLink="/auth/sign-up" class="text-primary font-semibold hover:text-primary-light">Create one</a></p>
      </div>
    </div>
  </div>
</div>
