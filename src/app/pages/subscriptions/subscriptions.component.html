<div class="min-h-screen bg-surface">
  <div class="bg-gradient-to-r from-accent to-primary py-16">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <h1 class="font-serif text-4xl font-bold text-white mb-2">💳 Subscriptions</h1>
      <p class="text-white/80 max-w-xl mx-auto">Choose a plan that matches your cultural appetite and unlock exclusive benefits.</p>
    </div>
  </div>

  <div class="max-w-5xl mx-auto px-6 py-16">
    <div class="grid md:grid-cols-3 gap-8">
      <div *ngFor="let plan of plans"
        class="bg-white rounded-2xl p-8 border-2 transition-all duration-300 relative"
        [ngClass]="[plan.color, plan.highlighted ? 'shadow-xl scale-105' : 'hover:shadow-lg']">
        <div *ngIf="plan.highlighted" class="absolute -top-3 left-1/2 -translate-x-1/2 px-4 py-1 bg-primary text-white text-xs font-bold rounded-full">MOST POPULAR</div>
        <h3 class="font-serif text-2xl font-bold text-dark mb-1">{{ plan.name }}</h3>
        <p class="text-gray-500 text-sm mb-6">{{ plan.desc }}</p>
        <div class="mb-6">
          <span class="text-4xl font-bold text-dark">{{ plan.price === 'Free' ? 'Free' : plan.price + ' TND' }}</span>
          <span *ngIf="plan.period" class="text-gray-400 text-sm">{{ plan.period }}</span>
        </div>
        <ul class="space-y-3 mb-8">
          <li *ngFor="let feature of plan.features" class="flex items-center gap-2 text-sm text-gray-600">
            <span class="w-5 h-5 bg-green-50 rounded-full flex items-center justify-center text-green-500 text-xs shrink-0">✓</span>
            {{ feature }}
          </li>
        </ul>
        <button [class]="plan.highlighted ? 'bg-primary text-white hover:bg-primary-light' : 'bg-gray-50 text-dark hover:bg-gray-100'" class="w-full py-3 rounded-xl font-semibold transition-colors text-sm">
          {{ plan.cta }}
        </button>
      </div>
    </div>
  </div>
</div>
