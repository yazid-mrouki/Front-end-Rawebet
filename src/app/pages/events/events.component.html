<div class="min-h-screen bg-surface">
  <!-- Header -->
  <div class="bg-gradient-to-r from-primary to-primary-light py-16">
    <div class="max-w-7xl mx-auto px-6">
      <h1 class="font-serif text-4xl font-bold text-white mb-2">Events</h1>
      <p class="text-white/80">Discover upcoming cultural events, watch parties, premieres, and more.</p>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-10">
    <!-- Category filters -->
    <div class="flex flex-wrap gap-2 mb-8">
      <button *ngFor="let cat of categories"
        (click)="setCategory(cat)"
        [class]="activeCategory === cat ? 'bg-primary text-white' : 'bg-white text-gray-600 hover:bg-gray-50'"
        class="px-4 py-2 rounded-xl text-sm font-medium transition-all border border-gray-100">
        {{ cat }}
      </button>
    </div>

    <!-- Events grid -->
    <div class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <div *ngFor="let event of filteredEvents" class="bg-white rounded-2xl overflow-hidden border border-gray-100 hover:shadow-xl transition-all duration-300 group">
        <div class="h-36 bg-gradient-to-br flex items-center justify-center relative" [ngClass]="event.color">
          <span class="text-5xl group-hover:scale-110 transition-transform">{{ event.emoji }}</span>
          <span class="absolute top-3 right-3 px-2.5 py-1 bg-white/20 backdrop-blur-sm text-white text-xs rounded-full font-medium">{{ event.category }}</span>
        </div>
        <div class="p-5">
          <h3 class="font-semibold text-dark mb-2">{{ event.title }}</h3>
          <div class="space-y-1.5 text-sm text-gray-500 mb-4">
            <div class="flex items-center gap-2">📅 {{ event.date }} · {{ event.time }}</div>
            <div class="flex items-center gap-2">📍 {{ event.location }}</div>
            <div class="flex items-center gap-2">🎟️ {{ event.price }}</div>
          </div>
          <!-- Capacity bar -->
          <div class="mb-4">
            <div class="flex justify-between text-xs text-gray-400 mb-1">
              <span>{{ event.spots }} spots left</span>
              <span>{{ event.totalSpots }} total</span>
            </div>
            <div class="w-full bg-gray-100 rounded-full h-1.5">
              <div class="bg-primary rounded-full h-1.5 transition-all" [style.width.%]="((event.totalSpots - event.spots) / event.totalSpots) * 100"></div>
            </div>
          </div>
          <button class="w-full py-2.5 bg-primary text-white rounded-xl text-sm font-semibold hover:bg-primary-light transition-colors">
            Reserve Spot
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
