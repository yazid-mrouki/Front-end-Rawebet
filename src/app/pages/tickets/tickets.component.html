<div class="min-h-screen bg-surface">
  <div class="bg-gradient-to-r from-accent to-primary py-16">
    <div class="max-w-7xl mx-auto px-6">
      <h1 class="font-serif text-4xl font-bold text-white mb-2">🎟️ Tickets</h1>
      <p class="text-white/80">Manage your tickets and purchase new ones.</p>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-10">
    <!-- Tabs -->
    <div class="flex gap-1 bg-white rounded-xl p-1 border border-gray-100 w-fit mb-8">
      <button (click)="activeTab = 'my-tickets'" [class]="activeTab === 'my-tickets' ? 'bg-primary text-white' : 'text-gray-600'" class="px-5 py-2.5 rounded-lg text-sm font-medium transition-all">My Tickets</button>
      <button (click)="activeTab = 'purchase'" [class]="activeTab === 'purchase' ? 'bg-primary text-white' : 'text-gray-600'" class="px-5 py-2.5 rounded-lg text-sm font-medium transition-all">Purchase</button>
    </div>

    <!-- My Tickets -->
    <div *ngIf="activeTab === 'my-tickets'" class="space-y-4">
      <div *ngFor="let ticket of myTickets" class="bg-white rounded-2xl border border-gray-100 overflow-hidden hover:shadow-lg transition-all">
        <div class="flex flex-col sm:flex-row">
          <div class="sm:w-28 p-6 flex items-center justify-center bg-gray-50 text-4xl">{{ ticket.emoji }}</div>
          <div class="flex-1 p-6">
            <div class="flex items-start justify-between">
              <div>
                <h3 class="font-semibold text-dark text-lg">{{ ticket.event }}</h3>
                <div class="text-gray-500 text-sm mt-1">📅 {{ ticket.date }} · {{ ticket.time }}</div>
                <div class="text-gray-400 text-xs mt-1">ID: {{ ticket.id }}</div>
              </div>
              <span [class]="ticket.status === 'Active' ? 'bg-green-50 text-green-600' : 'bg-gray-100 text-gray-500'" class="px-3 py-1 rounded-full text-xs font-semibold">{{ ticket.status }}</span>
            </div>
            <div class="mt-4 flex gap-3">
              <button class="px-4 py-2 bg-primary/10 text-primary rounded-lg text-xs font-semibold hover:bg-primary/20 transition-colors">View QR Code</button>
              <button *ngIf="ticket.status === 'Active'" class="px-4 py-2 bg-gray-50 text-gray-600 rounded-lg text-xs font-medium hover:bg-gray-100 transition-colors">Download PDF</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Purchase -->
    <div *ngIf="activeTab === 'purchase'" class="bg-white rounded-2xl border border-gray-100 p-8 max-w-2xl">
      <h3 class="font-serif text-2xl font-bold text-dark mb-6">Purchase Tickets</h3>
      <form class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Select Event</label>
          <select class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-sm">
            <option>Champions League Final Watch Party</option>
            <option>Indie Film Festival – Opening Night</option>
            <option>Theatre Workshop: Acting Masterclass</option>
            <option>Stand-Up Comedy Night</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Number of Tickets</label>
            <input type="number" min="1" max="10" value="1" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-sm" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Seat Type</label>
            <select class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-sm">
              <option>Standard</option>
              <option>VIP</option>
              <option>Premium</option>
            </select>
          </div>
        </div>
        <div class="bg-gray-50 rounded-xl p-4">
          <div class="flex justify-between text-sm"><span class="text-gray-500">Subtotal</span><span class="font-medium">15.00 TND</span></div>
          <div class="flex justify-between text-sm mt-1"><span class="text-gray-500">Service Fee</span><span class="font-medium">1.50 TND</span></div>
          <div class="border-t border-gray-200 mt-2 pt-2 flex justify-between"><span class="font-semibold">Total</span><span class="font-bold text-primary">16.50 TND</span></div>
        </div>
        <button type="submit" class="w-full py-3 bg-accent text-dark rounded-xl font-bold hover:bg-accent-light transition-colors shadow-lg shadow-accent/20">
          Complete Purchase
        </button>
      </form>
    </div>
  </div>
</div>
