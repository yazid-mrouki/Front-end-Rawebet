<div class="min-h-screen bg-surface">
  <div class="bg-gradient-to-r from-dark to-primary py-16">
    <div class="max-w-7xl mx-auto px-6">
      <h1 class="font-serif text-4xl font-bold text-white mb-2">🎬 Films & Premieres</h1>
      <p class="text-white/80">Now showing and upcoming films at Rawebet cultural center.</p>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-10">
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div *ngFor="let film of films" class="bg-white rounded-2xl overflow-hidden border border-gray-100 hover:shadow-xl transition-all duration-300 group">
        <div class="h-52 bg-gradient-to-br from-dark to-gray-800 flex items-center justify-center relative">
          <span class="text-7xl group-hover:scale-110 transition-transform">{{ film.emoji }}</span>
          <div class="absolute bottom-3 left-3 px-3 py-1 bg-accent text-dark text-xs rounded-full font-bold">{{ film.genre }}</div>
          <div class="absolute top-3 right-3 px-2.5 py-1 bg-white/20 backdrop-blur-sm text-white text-xs rounded-full font-medium flex items-center gap-1">
            ⭐ {{ film.rating }}
          </div>
        </div>
        <div class="p-6">
          <h3 class="font-serif text-xl font-bold text-dark mb-1">{{ film.title }}</h3>
          <p class="text-gray-500 text-sm mb-3">{{ film.description }}</p>
          <div class="flex items-center gap-3 text-xs text-gray-400 mb-4">
            <span>🕐 {{ film.duration }}</span>
            <span>💰 {{ film.price }}</span>
          </div>
          <!-- Showtimes -->
          <div class="mb-4">
            <div class="text-xs text-gray-400 font-medium mb-2">SHOWTIMES TODAY</div>
            <div class="flex gap-2">
              <button *ngFor="let time of film.showtimes" class="px-3 py-1.5 border border-gray-200 rounded-lg text-xs font-medium text-gray-600 hover:border-primary hover:text-primary transition-colors">
                {{ time }}
              </button>
            </div>
          </div>
          <button class="w-full py-2.5 bg-accent text-dark rounded-xl text-sm font-bold hover:bg-accent-light transition-colors">
            Book Tickets
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
