<!-- ─── Navigation tabs ─── -->
<div class="bg-white border-b border-gray-100 sticky top-16 z-40 -mx-6 px-6 mb-8">
  <nav class="max-w-7xl mx-auto flex gap-1 py-2">
    <a routerLink="/club" [routerLinkActiveOptions]="{exact:true}" routerLinkActive="text-primary bg-primary/5"
       class="flex items-center gap-2 px-4 py-2.5 rounded-t-xl text-sm font-medium text-gray-500 hover:text-primary hover:bg-primary/5 transition-colors">
      🏠 Club Home
    </a>
    <a routerLink="/club/events" routerLinkActive="text-primary bg-primary/5 border-b-2 border-primary"
       class="flex items-center gap-2 px-4 py-2.5 rounded-t-xl text-sm font-medium text-gray-500 hover:text-primary hover:bg-primary/5 transition-colors">
      🎭 Events
    </a>
    <a routerLink="/club/members" routerLinkActive="text-primary bg-primary/5 border-b-2 border-primary"
       class="flex items-center gap-2 px-4 py-2.5 rounded-t-xl text-sm font-medium text-gray-500 hover:text-primary hover:bg-primary/5 transition-colors">
      👥 Members
    </a>
    <a routerLink="/club/join" routerLinkActive="text-primary bg-primary/5 border-b-2 border-primary"
       class="flex items-center gap-2 px-4 py-2.5 rounded-t-xl text-sm font-medium text-gray-500 hover:text-primary hover:bg-primary/5 transition-colors">
      ✋ Join Club
    </a>
  </nav>
</div>

<div class="max-w-7xl mx-auto px-6 pb-12">
  <div class="max-w-2xl mx-auto">

    <!-- Success state -->
    <div *ngIf="success" class="bg-white rounded-2xl border border-gray-100 p-12 text-center shadow-sm">
      <div class="w-20 h-20 bg-green-50 rounded-2xl flex items-center justify-center mx-auto mb-6 text-4xl">✅</div>
      <h3 class="font-serif text-2xl font-bold text-dark mb-3">Request Submitted!</h3>
      <p class="text-gray-500 text-sm mb-8">
        Your join request has been submitted. An admin will review it shortly.<br/>
        You'll be notified once it's approved.
      </p>
      <a routerLink="/club/events"
         class="inline-block px-8 py-3 bg-primary text-white rounded-xl text-sm font-semibold hover:bg-primary-light transition-colors">
        Browse Events →
      </a>
    </div>

    <!-- Join form -->
    <div *ngIf="!success" class="bg-white rounded-2xl border border-gray-100 p-8 shadow-sm">

      <div class="flex items-center gap-4 mb-8">
        <div class="w-14 h-14 bg-primary/10 rounded-2xl flex items-center justify-center text-3xl shrink-0">✋</div>
        <div>
          <h2 class="font-serif text-2xl font-bold text-dark">Join the Club</h2>
          <p class="text-gray-400 text-sm mt-0.5">Tell us why you want to become a member</p>
        </div>
      </div>

      <div *ngIf="error"
           class="mb-5 bg-red-50 border border-red-100 text-red-700 rounded-xl px-4 py-3 flex items-center gap-2 text-sm">
        ⚠️ {{error}}
      </div>

      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-2">Your motivation</label>
        <textarea
          [(ngModel)]="motivation"
          placeholder="Share your passion for culture and why you'd like to join Club Rawabet..."
          rows="6"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-600 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none resize-none transition-colors">
        </textarea>
        <p class="text-xs text-gray-400 mt-1.5 text-right">{{motivation.length}} / 1000</p>
      </div>

      <button
        (click)="submit()"
        [disabled]="loading || !motivation.trim()"
        class="w-full bg-primary text-white rounded-xl py-3.5 font-bold hover:bg-primary-light transition-colors disabled:opacity-50 disabled:cursor-not-allowed text-sm">
        {{loading ? 'Submitting...' : 'Submit Membership Request'}}
      </button>

    </div>

  </div>
</div>
