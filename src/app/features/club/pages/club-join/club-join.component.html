<div class="max-w-2xl mx-auto">

  <!-- Success state -->
  <div *ngIf="success" class="bg-white rounded-2xl border border-gray-100 p-10 text-center">
    <div class="w-16 h-16 bg-green-50 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl">✅</div>
    <h3 class="font-serif text-xl font-bold text-dark mb-2">Request Submitted!</h3>
    <p class="text-gray-500 text-sm">Your join request has been submitted. You'll be notified once it's reviewed.</p>
  </div>

  <!-- Join form -->
  <div *ngIf="!success" class="bg-white rounded-2xl border border-gray-100 p-8">

    <div class="flex items-center gap-4 mb-6">
      <div class="w-12 h-12 bg-primary/10 rounded-2xl flex items-center justify-center text-2xl shrink-0">✋</div>
      <div>
        <h2 class="font-serif text-2xl font-bold text-dark">Join the Club</h2>
        <p class="text-gray-400 text-sm mt-0.5">Tell us why you want to be a member</p>
      </div>
    </div>

    <div *ngIf="error"
         class="mb-4 bg-red-50 border border-red-100 text-red-700 rounded-xl px-4 py-3 flex items-center gap-2 text-sm">
      <span>⚠️</span> {{error}}
    </div>

    <div class="mb-5">
      <label class="block text-sm font-medium text-gray-700 mb-1.5">Your motivation</label>
      <textarea
        [(ngModel)]="motivation"
        placeholder="Why do you want to join?"
        rows="5"
        class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-600 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none resize-none transition-colors">
      </textarea>
    </div>

    <button
      (click)="submit()"
      [disabled]="loading || !motivation"
      class="w-full bg-primary text-white rounded-xl py-3 font-semibold hover:bg-primary-light transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
      {{loading ? 'Submitting...' : 'Submit Request'}}
    </button>

  </div>

</div>
