<div>

  <!-- Section header -->
  <div class="mb-6">
    <h2 class="font-serif text-2xl font-bold text-dark">My Reservations</h2>
    <p class="text-gray-400 text-sm mt-1">Track and manage your event reservations</p>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center py-16">
    <div class="w-14 h-14 bg-primary/10 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl">🎟️</div>
    <p class="text-gray-400 text-sm">Loading reservations...</p>
  </div>

  <!-- Empty state -->
  <div *ngIf="!loading && reservations.length === 0" class="text-center py-16">
    <div class="w-16 h-16 bg-gray-50 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl">🎟️</div>
    <p class="text-gray-500 font-medium">No reservations yet</p>
    <p class="text-gray-400 text-sm mt-1">Reserve an event from the Events tab</p>
  </div>

  <!-- Reservation list -->
  <div *ngIf="!loading && reservations.length > 0" class="space-y-4">

    <div *ngFor="let r of reservations"
         class="bg-white rounded-2xl border border-gray-100 overflow-hidden hover:shadow-lg transition-all duration-300">

      <div class="flex items-stretch">

        <!-- Status strip -->
        <div class="w-1.5 shrink-0"
             [class.bg-primary]="r.status === 'CONFIRMED'"
             [class.bg-gray-200]="r.status !== 'CONFIRMED'">
        </div>

        <!-- Content -->
        <div class="flex-1 p-5 flex items-center justify-between gap-4">

          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center text-2xl shrink-0">🎭</div>
            <div>
              <h3 class="font-semibold text-dark">{{r.eventTitle}}</h3>
              <div class="flex items-center gap-4 mt-1 text-xs text-gray-400">
                <span>🎟️ {{r.reservedPlaces}} place(s)</span>
                <span>📅 {{r.reservationDate | date:'mediumDate'}}</span>
              </div>
            </div>
          </div>

          <div class="flex items-center gap-3 shrink-0">
            <span class="text-xs font-semibold rounded-full px-3 py-1"
                  [class.bg-green-50]="r.status === 'CONFIRMED'"
                  [class.text-green-600]="r.status === 'CONFIRMED'"
                  [class.bg-gray-100]="r.status !== 'CONFIRMED'"
                  [class.text-gray-500]="r.status !== 'CONFIRMED'">
              {{r.status}}
            </span>
            <button *ngIf="r.status === 'CONFIRMED'"
                    (click)="cancel(r.id)"
                    class="bg-red-50 text-red-600 rounded-xl px-4 py-2 text-sm font-semibold hover:bg-red-100 transition-colors">
              Cancel
            </button>
          </div>

        </div>

      </div>

    </div>

  </div>

</div>
