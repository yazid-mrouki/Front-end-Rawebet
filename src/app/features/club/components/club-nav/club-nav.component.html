<div class="bg-white border-b border-gray-100 sticky top-16 z-40 -mx-6 px-6 mb-8">
  <nav class="max-w-7xl mx-auto flex gap-1 py-2 overflow-x-auto scrollbar-hide">

    <a routerLink="/club"
       [routerLinkActiveOptions]="{ exact: true }"
       routerLinkActive="text-primary bg-primary/5 border-b-2 border-primary"
       class="flex items-center gap-2 px-4 py-2.5 rounded-t-xl text-sm font-medium text-gray-500 hover:text-primary hover:bg-primary/5 transition-colors whitespace-nowrap">
      🏠 Club Home
    </a>

    <a routerLink="/club/events"
       routerLinkActive="text-primary bg-primary/5 border-b-2 border-primary"
       class="flex items-center gap-2 px-4 py-2.5 rounded-t-xl text-sm font-medium text-gray-500 hover:text-primary hover:bg-primary/5 transition-colors whitespace-nowrap">
      🎭 Events
    </a>

    <a routerLink="/club/members"
       routerLinkActive="text-primary bg-primary/5 border-b-2 border-primary"
       class="flex items-center gap-2 px-4 py-2.5 rounded-t-xl text-sm font-medium text-gray-500 hover:text-primary hover:bg-primary/5 transition-colors whitespace-nowrap">
      👥 Members
    </a>

    <!-- Onglet membre : My Reservations -->
    <a *ngIf="showReservations && !isAdmin"
       routerLink="/club/my-reservations"
       routerLinkActive="text-primary bg-primary/5 border-b-2 border-primary"
       class="flex items-center gap-2 px-4 py-2.5 rounded-t-xl text-sm font-medium text-gray-500 hover:text-primary hover:bg-primary/5 transition-colors whitespace-nowrap">
      🎟️ My Reservations
    </a>

    <!-- Onglet admin → redirige vers le backoffice -->
    <a *ngIf="isAdmin"
       routerLink="/admin/club"
       class="flex items-center gap-2 px-4 py-2.5 rounded-t-xl text-sm font-semibold text-primary hover:bg-primary/5 transition-colors whitespace-nowrap">
      ⚙️ Admin Panel
    </a>

  </nav>
</div>
