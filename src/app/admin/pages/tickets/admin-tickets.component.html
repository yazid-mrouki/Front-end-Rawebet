<div class="p-6 lg:p-8 bg-gray-50 min-h-full space-y-6">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div><h1 class="font-serif text-2xl font-bold text-dark">Ticket Management</h1><p class="text-sm text-gray-400 mt-1">{{ tickets.length }} tickets issued</p></div>
    <button class="px-5 py-2.5 bg-primary text-white rounded-xl text-sm font-medium hover:bg-primary-light transition-colors">Export CSV</button>
  </div>
  <input [(ngModel)]="searchQuery" type="text" placeholder="Search by user, event, or ticket ID..." class="w-full sm:w-96 px-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm outline-none focus:border-primary" />
  <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead><tr class="text-left text-xs text-gray-400 border-b border-gray-100 bg-gray-50/50">
          <th class="px-6 py-3 font-medium">Ticket ID</th><th class="px-4 py-3 font-medium">User</th><th class="px-4 py-3 font-medium">Event</th><th class="px-4 py-3 font-medium">Qty</th><th class="px-4 py-3 font-medium">Total</th><th class="px-4 py-3 font-medium">Date</th><th class="px-4 py-3 font-medium">Status</th><th class="px-4 py-3 font-medium text-right">Actions</th>
        </tr></thead>
        <tbody>
          <tr *ngFor="let t of filteredTickets" class="border-b border-gray-50 hover:bg-gray-50/50">
            <td class="px-6 py-4 font-mono text-xs text-primary font-semibold">{{ t.id }}</td>
            <td class="px-4 py-4 text-dark font-medium text-xs">{{ t.user }}</td>
            <td class="px-4 py-4 text-gray-500 text-xs">{{ t.event }}</td>
            <td class="px-4 py-4 text-gray-500 text-xs">{{ t.qty }}</td>
            <td class="px-4 py-4 text-dark font-semibold text-xs">{{ t.total > 0 ? t.total + ' TND' : 'Free' }}</td>
            <td class="px-4 py-4 text-gray-500 text-xs">{{ t.date }}</td>
            <td class="px-4 py-4"><span [class]="getStatusClass(t.status)" class="px-2.5 py-1 rounded-full text-[10px] font-semibold">{{ t.status }}</span></td>
            <td class="px-4 py-4 text-right"><button class="p-1.5 hover:bg-blue-50 rounded-lg text-xs">👁️</button><button class="p-1.5 hover:bg-red-50 rounded-lg text-xs">🗑️</button></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
