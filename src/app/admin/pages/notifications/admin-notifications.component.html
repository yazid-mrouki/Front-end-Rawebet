<div class="p-6 lg:p-8 bg-gray-50 min-h-full space-y-6">
  <div><h1 class="font-serif text-2xl font-bold text-dark">Push Notifications</h1><p class="text-sm text-gray-400 mt-1">Send and manage notifications</p></div>

  <!-- Compose -->
  <div class="bg-white rounded-2xl border border-gray-100 p-6">
    <h3 class="font-semibold text-dark mb-4">Send New Notification</h3>
    <div class="space-y-4">
      <input [(ngModel)]="newTitle" type="text" placeholder="Notification title..." class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-primary" />
      <textarea [(ngModel)]="newMessage" placeholder="Notification message..." rows="3" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-primary resize-none"></textarea>
      <div class="flex flex-col sm:flex-row gap-3">
        <select [(ngModel)]="newTarget" class="px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none text-gray-600">
          <option value="all">All Users</option><option value="subs">Subscribers Only</option><option value="loyalty">Loyalty Members</option>
        </select>
        <button (click)="sendNotification()" class="px-6 py-2.5 bg-primary text-white rounded-xl text-sm font-medium hover:bg-primary-light transition-colors">📢 Send Notification</button>
      </div>
    </div>
  </div>

  <!-- Sent Notifications -->
  <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
    <div class="p-6 pb-0"><h3 class="font-semibold text-dark">Sent Notifications</h3></div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm mt-4">
        <thead><tr class="text-left text-xs text-gray-400 border-b border-gray-100">
          <th class="px-6 py-3 font-medium">Title</th><th class="px-4 py-3 font-medium">Target</th><th class="px-4 py-3 font-medium">Sent</th><th class="px-4 py-3 font-medium">Read By</th>
        </tr></thead>
        <tbody>
          <tr *ngFor="let n of sentNotifications" class="border-b border-gray-50 hover:bg-gray-50/50">
            <td class="px-6 py-4"><div class="font-medium text-dark text-xs">{{ n.title }}</div><div class="text-[10px] text-gray-400 mt-0.5 truncate max-w-xs">{{ n.message }}</div></td>
            <td class="px-4 py-4"><span class="bg-gray-100 text-gray-600 px-2.5 py-1 rounded-full text-[10px] font-semibold">{{ n.target }}</span></td>
            <td class="px-4 py-4 text-gray-500 text-xs whitespace-nowrap">{{ n.sent }}</td>
            <td class="px-4 py-4 text-gray-600 font-semibold text-xs">{{ n.read }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
