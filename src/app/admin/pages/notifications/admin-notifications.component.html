<div class="p-6 space-y-6 bg-surface min-h-screen">

  <!-- HEADER -->
  <div class="flex items-center justify-between">
    <h2 class="text-3xl font-bold text-dark">Notifications</h2>

    <div class="text-xs text-muted bg-white px-3 py-1 rounded-full shadow-sm border">
      Admin Panel
    </div>
  </div>

  <!-- FORM CARD -->
  <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-6 space-y-6">

    <!-- TYPE SELECT -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

      <!-- Target Type -->
      <div>
        <label class="text-sm text-muted mb-2 block">Send To</label>

        <select [(ngModel)]="newTargetType"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-surface focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)] transition">
          <option value="all">🌍 All Users</option>
          <option value="subscriber">⭐ Subscribers</option>
          <option value="user">👤 Specific User</option>
        </select>
      </div>

      <!-- User Select -->
      <div *ngIf="newTargetType === 'user'">
        <label class="text-sm text-muted mb-2 block">Select User</label>

        <select [(ngModel)]="selectedUser"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-surface focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)] transition">
          <option value="" disabled>Select a user</option>
          <option *ngFor="let u of users" [value]="u.id">
            {{ u.nom }}
          </option>
        </select>
      </div>

    </div>

    <!-- MESSAGE -->
    <div>
      <label class="text-sm text-muted mb-2 block">Message</label>

      <textarea [(ngModel)]="newMessage"
        rows="5"
        class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-surface focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)] transition resize-none"
        placeholder="Write your message here..."></textarea>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="flex flex-col sm:flex-row gap-3 pt-2">

      <!-- PUSH -->
      <button (click)="sendNotification()"
        class="flex-1 bg-[var(--color-primary)] hover:bg-[var(--color-primary-light)] text-white font-semibold px-5 py-3 rounded-xl shadow-md transition transform hover:scale-[1.02] active:scale-95">

        🚀 Send Notification
      </button>

      <!-- EMAIL -->
      <button (click)="sendEmail()"
        class="flex-1 bg-[var(--color-accent)] hover:bg-[var(--color-accent-light)] text-white font-semibold px-5 py-3 rounded-xl shadow-md transition transform hover:scale-[1.02] active:scale-95">

        ✉️ Send Email
      </button>

    </div>

  </div>

  <!-- NOTIFICATIONS LIST SECTION -->
  <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-6 space-y-6">

    <!-- HEADER -->
    <div class="flex items-center justify-between">
      <div>
        <h3 class="text-2xl font-bold text-dark">📋 All Notifications</h3>
        <p class="text-sm text-muted mt-1">{{ filteredNotifications.length }} notification(s)</p>
      </div>
      <div class="flex gap-3">
        <button (click)="loadAllNotifications()"
                [disabled]="loading"
                class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition disabled:opacity-50">
          🔄 Refresh
        </button>
        <button *ngIf="allNotifications.length > 0"
                (click)="deleteAllNotifications()"
                [disabled]="loading"
                class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition disabled:opacity-50">
          🗑️ Delete All
        </button>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 pb-4 border-b border-gray-200">

      <!-- Search -->
      <div>
        <input type="text"
               [(ngModel)]="searchQuery"
               (ngModelChange)="applyFilters()"
               placeholder="Search notifications..."
               class="w-full px-4 py-2 rounded-lg border border-gray-200 bg-surface focus:outline-none focus:ring-2 focus:ring-primary transition">
      </div>

      <!-- Type Filter -->
      <div>
        <select [(ngModel)]="filterType"
                (ngModelChange)="applyFilters()"
                class="w-full px-4 py-2 rounded-lg border border-gray-200 bg-surface focus:outline-none focus:ring-2 focus:ring-primary transition">
          <option value="">All Types</option>
          <option *ngFor="let type of notificationTypes" [value]="type">{{ type }}</option>
        </select>
      </div>

      <!-- Status Filter -->
      <div>
        <select [(ngModel)]="filterStatus"
                (ngModelChange)="applyFilters()"
                class="w-full px-4 py-2 rounded-lg border border-gray-200 bg-surface focus:outline-none focus:ring-2 focus:ring-primary transition">
          <option value="all">All Status</option>
          <option value="read">✓ Read</option>
          <option value="unread">● Unread</option>
        </select>
      </div>

    </div>

    <!-- LOADING STATE -->
    <div *ngIf="loading" class="flex items-center justify-center py-10">
      <div class="text-center">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-primary mx-auto mb-3"></div>
        <p class="text-gray-500">Loading notifications...</p>
      </div>
    </div>

    <!-- EMPTY STATE -->
    <div *ngIf="!loading && filteredNotifications.length === 0" class="text-center py-10">
      <p class="text-3xl mb-2">📭</p>
      <p class="text-gray-500">No notifications found</p>
    </div>

    <!-- NOTIFICATIONS TABLE -->
    <div *ngIf="!loading && filteredNotifications.length > 0" class="overflow-x-auto">
      <table class="w-full">
        <thead class="bg-gray-50 border-b border-gray-200">
          <tr>
            <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">Type</th>
            <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">Message</th>
            <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">Status</th>
            <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">Date</th>
            <th class="px-4 py-3 text-center text-sm font-semibold text-gray-700">Action</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
          <tr *ngFor="let notif of filteredNotifications"
              class="hover:bg-gray-50 transition">

            <!-- Type -->
            <td class="px-4 py-3">
              <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-semibold">
                {{ notif.type }}
              </span>
            </td>

            <!-- Message -->
            <td class="px-4 py-3">
              <p class="text-sm text-gray-700 line-clamp-2">{{ notif.message }}</p>
            </td>

            <!-- Status -->
            <td class="px-4 py-3">
              <span *ngIf="notif.lue" class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs font-semibold flex items-center gap-1 w-fit">
                <span class="animate-pulse">✓</span> Read
              </span>
              <span *ngIf="!notif.lue" class="px-2 py-1 bg-orange-100 text-orange-700 rounded text-xs font-semibold flex items-center gap-1 w-fit">
                <span class="animate-pulse">●</span> Unread
              </span>
            </td>

            <!-- Date -->
            <td class="px-4 py-3 text-sm text-gray-500">
              {{ formatDate(notif.dateEnvoi) }}
            </td>

            <!-- Delete Button -->
            <td class="px-4 py-3 text-center">
              <button (click)="deleteNotification(notif.id)"
                      [disabled]="deleting[notif.id]"
                      class="px-3 py-1 bg-red-100 text-red-600 hover:bg-red-200 rounded text-sm font-semibold transition disabled:opacity-50">
                {{ deleting[notif.id] ? '⟳' : '🗑️' }} Delete
              </button>
            </td>

          </tr>
        </tbody>
      </table>
    </div>

  </div>

</div>
