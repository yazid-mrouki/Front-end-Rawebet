<div class="p-6 lg:p-8 bg-gray-50 min-h-full space-y-6">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div><h1 class="font-serif text-2xl font-bold text-dark">Subscription Management</h1><p class="text-sm text-gray-400 mt-1">{{ subscribers.length }} paid subscribers</p></div>
  </div>

  <!-- Plan summary cards -->
  <div class="grid sm:grid-cols-3 gap-4">
    <div *ngFor="let s of stats" class="bg-white rounded-2xl border border-gray-100 p-5">
      <div class="flex items-center gap-3 mb-2"><div class="w-3 h-3 rounded-full" [ngClass]="s.color"></div><span class="text-sm font-medium text-dark">{{ s.label }}</span></div>
      <div class="text-2xl font-bold text-dark">{{ s.count }}</div>
      <p class="text-xs text-gray-400 mt-1">{{ s.pct }}% of users<span *ngIf="s.revenue"> · {{ s.revenue }} TND/mo revenue</span></p>
    </div>
  </div>

  <input [(ngModel)]="searchQuery" type="text" placeholder="Search subscribers..." class="w-full sm:w-80 px-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm outline-none focus:border-primary" />

  <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead><tr class="text-left text-xs text-gray-400 border-b border-gray-100 bg-gray-50/50">
          <th class="px-6 py-3 font-medium">User</th><th class="px-4 py-3 font-medium">Plan</th><th class="px-4 py-3 font-medium">Started</th><th class="px-4 py-3 font-medium">Renews</th><th class="px-4 py-3 font-medium">Amount</th><th class="px-4 py-3 font-medium">Status</th>
        </tr></thead>
        <tbody>
          <tr *ngFor="let s of filteredSubs" class="border-b border-gray-50 hover:bg-gray-50/50">
            <td class="px-6 py-4 font-medium text-dark text-xs">{{ s.user }}</td>
            <td class="px-4 py-4 text-xs"><span [class]="s.plan === 'Patron' ? 'text-accent font-semibold' : 'text-primary font-semibold'">{{ s.plan }}</span></td>
            <td class="px-4 py-4 text-gray-500 text-xs">{{ s.started }}</td>
            <td class="px-4 py-4 text-gray-500 text-xs">{{ s.renews }}</td>
            <td class="px-4 py-4 text-dark font-semibold text-xs">{{ s.amount }} TND/mo</td>
            <td class="px-4 py-4"><span [class]="getStatusClass(s.status)" class="px-2.5 py-1 rounded-full text-[10px] font-semibold">{{ s.status }}</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
