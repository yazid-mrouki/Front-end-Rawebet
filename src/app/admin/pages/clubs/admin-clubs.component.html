<div class="p-6 lg:p-8 bg-gray-50 min-h-full space-y-6">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div><h1 class="font-serif text-2xl font-bold text-dark">Club Management</h1><p class="text-sm text-gray-400 mt-1">{{ clubs.length }} clubs</p></div>
    <button class="px-5 py-2.5 bg-primary text-white rounded-xl text-sm font-medium hover:bg-primary-light transition-colors flex items-center gap-2"><span>＋</span> New Club</button>
  </div>
  <input [(ngModel)]="searchQuery" type="text" placeholder="Search clubs..." class="w-full sm:w-80 px-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm outline-none focus:border-primary" />
  <div class="grid sm:grid-cols-2 xl:grid-cols-3 gap-4">
    <div *ngFor="let c of filteredClubs" class="bg-white rounded-2xl border border-gray-100 p-5 hover:shadow-lg transition-all">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-semibold text-dark">{{ c.name }}</h3>
        <span [class]="c.status === 'Active' ? 'bg-green-50 text-green-600' : 'bg-gray-100 text-gray-500'" class="px-2.5 py-1 rounded-full text-[10px] font-semibold">{{ c.status }}</span>
      </div>
      <p class="text-xs text-gray-400 mb-4">Led by {{ c.leader }} · Founded {{ c.founded }}</p>
      <div class="flex items-center gap-4 text-xs text-gray-500 mb-4">
        <span>👥 {{ c.members }} members</span><span>🎭 {{ c.events }} events</span>
      </div>
      <div class="flex gap-2">
        <button class="flex-1 py-2 bg-gray-50 rounded-xl text-xs font-medium text-gray-600 hover:bg-primary/5 hover:text-primary transition-colors">Edit</button>
        <button class="py-2 px-3 bg-red-50 rounded-xl text-xs text-red-500 hover:bg-red-100 transition-colors" (click)="deleteClub(c.id)">🗑️</button>
      </div>
    </div>
  </div>
</div>
