<div class="flex h-screen bg-gray-50 overflow-hidden">

  <!-- ═══════════ LEFT SIDEBAR ═══════════ -->
  <aside class="sidebar flex flex-col bg-dark text-white transition-all duration-300 z-30"
    [class.w-64]="!sidebarCollapsed" [class.w-20]="sidebarCollapsed">

    <!-- Brand -->
    <div class="flex items-center gap-3 px-5 py-5 border-b border-white/10">
      <div class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center shrink-0">
        <span class="text-white font-bold text-lg">R</span>
      </div>
      <div *ngIf="!sidebarCollapsed" class="overflow-hidden">
        <div class="font-serif text-lg font-bold leading-tight">Rawebet</div>
        <div class="text-[10px] text-white/40 uppercase tracking-widest">Admin Panel</div>
      </div>
    </div>

    <!-- Nav Links -->
    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1 scrollbar-thin">
      <a *ngFor="let item of menuItems"
        [routerLink]="item.route"
        routerLinkActive="bg-white/15 text-accent"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-white/70 hover:bg-white/10 hover:text-white transition-all group"
        [class.justify-center]="sidebarCollapsed">
        <span class="text-lg shrink-0 group-hover:scale-110 transition-transform">{{ item.icon }}</span>
        <span *ngIf="!sidebarCollapsed" class="truncate">{{ item.label }}</span>
      </a>
    </nav>

    <!-- Sidebar Footer -->
    <div class="border-t border-white/10 p-3">
      <button (click)="toggleSidebar()" class="w-full flex items-center justify-center gap-2 px-3 py-2.5 rounded-xl text-white/50 hover:text-white hover:bg-white/10 transition-all text-sm">
        <svg class="w-5 h-5 transition-transform" [class.rotate-180]="sidebarCollapsed" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/></svg>
        <span *ngIf="!sidebarCollapsed">Collapse</span>
      </button>
      <a routerLink="/home" class="mt-1 w-full flex items-center justify-center gap-2 px-3 py-2.5 rounded-xl text-white/50 hover:text-accent hover:bg-white/10 transition-all text-sm"
        [class.justify-center]="sidebarCollapsed">
        <span>🚪</span>
        <span *ngIf="!sidebarCollapsed">Back to Site</span>
      </a>
    </div>
  </aside>

  <!-- ═══════════ MAIN CONTENT ═══════════ -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- Top Bar -->
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between shrink-0">
      <div class="flex items-center gap-4">
        <button (click)="toggleSidebar()" class="lg:hidden p-2 rounded-lg text-gray-500 hover:bg-gray-100">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div>
          <h2 class="font-semibold text-dark text-sm">Super Admin</h2>
          <p class="text-xs text-gray-400">Rawebet Cultural Center Management</p>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <!-- Search -->
        <div class="hidden md:flex items-center bg-gray-50 rounded-xl px-3 py-2 border border-gray-100">
          <svg class="w-4 h-4 text-gray-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" placeholder="Search..." class="bg-transparent outline-none text-sm text-gray-600 w-40" />
        </div>

        <!-- Notifications -->
        <button class="relative p-2 rounded-xl hover:bg-gray-50 transition-colors">
          <span class="text-lg">🔔</span>
          <span class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-red-500 text-white text-[9px] font-bold rounded-full flex items-center justify-center">5</span>
        </button>

        <!-- Admin avatar -->
        <div class="flex items-center gap-2 pl-3 border-l border-gray-200">
          <div class="w-8 h-8 bg-primary rounded-full flex items-center justify-center">
            <span class="text-white font-semibold text-xs">SA</span>
          </div>
          <div class="hidden sm:block">
            <div class="text-xs font-semibold text-dark">Super Admin</div>
            <div class="text-[10px] text-gray-400">admin&#64;rawebet.com</div>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 overflow-y-auto">
      <router-outlet />
    </main>
  </div>
</div>
