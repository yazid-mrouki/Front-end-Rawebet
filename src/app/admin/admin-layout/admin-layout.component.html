<div class="flex h-screen bg-gray-50 overflow-hidden" (click)="closeProfileDropdown()">

  <!-- SIDEBAR -->
  <aside class="sidebar flex flex-col bg-dark text-white transition-all duration-300 z-30"
         [class.w-64]="!sidebarCollapsed" [class.w-20]="sidebarCollapsed">

    <div class="flex items-center gap-3 px-5 py-5 border-b border-white/10">
      <div class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center shrink-0">
        <span class="text-white font-bold text-lg">R</span>
      </div>
      <div *ngIf="!sidebarCollapsed" class="overflow-hidden">
        <div class="font-serif text-lg font-bold leading-tight">Rawebet</div>
        <div class="text-[10px] text-white/40 uppercase tracking-widest">Admin Panel</div>
      </div>
    </div>

    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1 scrollbar-thin">
      <a *ngFor="let item of menuItems"
         [routerLink]="item.route"
         routerLinkActive="bg-white/15 text-accent"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-white/70 hover:bg-white/10 hover:text-white transition-all group"
         [class.justify-center]="sidebarCollapsed">
        <span class="text-lg shrink-0 group-hover:scale-110 transition-transform">{{ item.icon }}</span>
        <span *ngIf="!sidebarCollapsed" class="truncate">{{ item.label }}</span>
      </a>
    </nav>

    <div class="border-t border-white/10 p-3 space-y-1">
      <button (click)="toggleSidebar()"
              class="w-full flex items-center gap-2 px-3 py-2.5 rounded-xl text-white/50 hover:text-white hover:bg-white/10 transition-all text-sm"
              [class.justify-center]="sidebarCollapsed">
        <svg class="w-5 h-5 shrink-0 transition-transform" [class.rotate-180]="sidebarCollapsed"
             fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
        </svg>
        <span *ngIf="!sidebarCollapsed">Reduire</span>
      </button>

      <!-- Voir le site anonyme -->
      <button (click)="openGuestPreview()"
              class="w-full flex items-center gap-2 px-3 py-2.5 rounded-xl text-white/50 hover:text-amber-400 hover:bg-white/10 transition-all text-sm"
              [class.justify-center]="sidebarCollapsed">
        <span class="shrink-0 text-base">👁️</span>
        <span *ngIf="!sidebarCollapsed">Voir le site (anonyme)</span>
      </button>

      <button (click)="logout()"
              class="w-full flex items-center gap-2 px-3 py-2.5 rounded-xl text-red-400/70 hover:text-red-400 hover:bg-white/10 transition-all text-sm"
              [class.justify-center]="sidebarCollapsed">
        <span class="shrink-0 text-base">🚪</span>
        <span *ngIf="!sidebarCollapsed">Se deconnecter</span>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between shrink-0">
      <div class="flex items-center gap-4">
        <button (click)="toggleSidebar()" class="lg:hidden p-2 rounded-lg text-gray-500 hover:bg-gray-100">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <div>
          <h2 class="font-semibold text-dark text-sm">{{ adminName }}</h2>
          <p class="text-xs text-gray-400">{{ adminEmail }}</p>
          <span class="mt-0.5 inline-flex items-center rounded-full bg-primary/10 px-2 py-0.5 text-[10px] font-semibold uppercase tracking-wide text-primary">
            {{ adminRoleLabel }}
          </span>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <div class="hidden md:flex items-center bg-gray-50 rounded-xl px-3 py-2 border border-gray-100">
          <svg class="w-4 h-4 text-gray-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input type="text" placeholder="Rechercher..." class="bg-transparent outline-none text-sm text-gray-600 w-40" />
        </div>

        <button class="relative p-2 rounded-xl hover:bg-gray-50 transition-colors">
          <span class="text-lg">🔔</span>
          <span class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-red-500 text-white text-[9px] font-bold rounded-full flex items-center justify-center">5</span>
        </button>

        <!-- Avatar + dropdown -->
        <div class="relative" (click)="$event.stopPropagation()">
          <button (click)="toggleProfileDropdown()"
                  class="flex items-center gap-2 pl-3 border-l border-gray-200 hover:opacity-80 transition-opacity">
            <div class="w-9 h-9 rounded-full overflow-hidden bg-primary flex items-center justify-center shrink-0">
              <img *ngIf="adminAvatarUrl" [src]="adminAvatarUrl" alt="avatar" class="w-full h-full object-cover" />
              <span *ngIf="!adminAvatarUrl" class="text-white font-semibold text-sm">{{ adminInitials }}</span>
            </div>
            <div class="hidden sm:block text-left">
              <div class="text-xs font-semibold text-dark leading-tight">{{ adminName }}</div>
              <div class="text-[10px] text-gray-400">{{ adminRoleLabel }}</div>
            </div>
            <svg class="w-4 h-4 text-gray-400 transition-transform ml-1"
                 [class.rotate-180]="profileDropdownOpen"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>

          <!-- Dropdown -->
          <div *ngIf="profileDropdownOpen"
               class="absolute right-0 top-full mt-2 w-60 rounded-2xl bg-white border border-gray-100 shadow-2xl overflow-hidden z-50">

            <!-- Header -->
            <div class="px-4 py-3 bg-gray-50 border-b border-gray-100 flex items-center gap-3">
              <div class="w-10 h-10 rounded-full overflow-hidden bg-primary flex items-center justify-center shrink-0">
                <img *ngIf="adminAvatarUrl" [src]="adminAvatarUrl" alt="avatar" class="w-full h-full object-cover" />
                <span *ngIf="!adminAvatarUrl" class="text-white font-semibold text-sm">{{ adminInitials }}</span>
              </div>
              <div class="min-w-0">
                <div class="text-sm font-semibold text-dark truncate">{{ adminName }}</div>
                <div class="text-[11px] text-gray-400 truncate">{{ adminEmail }}</div>
              </div>
            </div>

            <div class="py-1">
              <!-- Mon profil -->
              <a routerLink="/profile" (click)="closeProfileDropdown()"
                 class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-primary/5 hover:text-primary transition-colors">
                <span class="text-base">👤</span>
                Mon Profil
              </a>

              <div class="my-1 border-t border-gray-100"></div>

              <!-- Voir le site anonyme -->
              <button (click)="openGuestPreview()"
                      class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-amber-50 hover:text-amber-700 transition-colors text-left">
                <span class="text-base">👁️</span>
                Voir le site (anonyme)
              </button>

              <!-- Mode client — juste en dessous de "Voir le site anonyme" -->
              <button (click)="startClientMode()" [disabled]="clientModeLoading"
                      class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-primary/5 hover:text-primary transition-colors text-left disabled:opacity-50">
                <span class="text-base">🎭</span>
                <span *ngIf="!clientModeLoading">Mode client (mon compte)</span>
                <span *ngIf="clientModeLoading">Chargement...</span>
              </button>

              <div class="my-1 border-t border-gray-100"></div>

              <button (click)="logout()"
                      class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition-colors text-left">
                <span class="text-base">🚪</span>
                Se deconnecter
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto">
      <router-outlet />
    </main>
  </div>
</div>
